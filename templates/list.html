{% extends "base.html" %}
{% block content %}
<h1>Employees</h1>
<a href="{{ url_for('add_employee') }}">Add Employee</a>
<table>
<tr><th>ID</th><th>Name</th><th>Salary</th><th>Actions</th></tr>
{% for e in employees %}
<tr>
<td>{{ e.id }}</td>
<td>{{ e.name }}</td>
<td>{{ format_salary(e.salary_gbp_pence) }}</td>
<td>
<a href="{{ url_for('view_employee', emp_id=e.id) }}">View</a>
<a href="{{ url_for('edit_employee', emp_id=e.id) }}">Edit</a>
<form method="post" action="{{ url_for('delete_employee', emp_id=e.id) }}" style="display:inline;">
<button type="submit">Delete</button>
</form>
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
